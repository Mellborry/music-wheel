<!DOCTYPE html>
<!--<html lang="ru">-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Музыкальное колесо2 эмоций</title>
  <style>
    :root {
      --bg: #000000;
      --card: #171b2e;
      --text: #f4f6ff;
      --muted: #aeb7d9;
      --ring: #2b3154;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #1a2142 0%, #0f1220 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; text-align: center; }
    p { margin: 0 0 20px; color: var(--muted); text-align: center; }
    .wrap {
      width: min(900px, 100%);
      display: grid;
      gap: 24px;
    }
    .card {
      background: rgba(23, 27, 46, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .slice {
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
      transform-origin: 300px 300px;
    }
    .slice:hover {
      filter: brightness(1.08);
    }
    .slice.active {
      filter: brightness(1.2) drop-shadow(0 0 10px rgba(255,255,255,0.25));
    }
    .label {
      font-size: 15px;
      font-weight: 700;
      fill: white;
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
    }
    .info {
      display: grid;
      gap: 12px;
    }
    .now-playing {
      font-size: 18px;
      font-weight: 700;
    }
    audio {
      width: 100%;
    }
    .hint {
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Wheel</h1>
      <p>Нажми на эмоцию — и начнёт играть соответствующий трек</p>

      <svg id="wheel" viewBox="0 0 600 600" aria-label="Колесо эмоций">
        <g id="slices"></g>
        <circle cx="300" cy="300" r="90" fill="#0f1220" stroke="var(--ring)" stroke-width="8"></circle>
        <text x="300" y="292" class="label" style="font-size:20px">PLUTCHIK</text>
        <text x="300" y="318" class="label" style="font-size:14px; fill:#aeb7d9">MUSIC PORTFOLIO</text>
      </svg>
    </div>

    <div class="card info">
      <div class="now-playing" id="nowPlaying">Сейчас ничего не играет</div>
      <audio id="audioPlayer" controls preload="metadata"></audio>
      <div class="hint">💡 Заменишь demo-файлы на свои MP3/WAV в папке <code>audio/</code>.</div>
    </div>
  </div>

  <script>
    const emotions = [
      { name: 'Joy', ru: 'Радость', color: '#f7c948', file: 'audio/test.mp3' },
      { name: 'Trust', ru: 'Доверие', color: '#5ac85a', file: 'audio/test.mp3' },
      { name: 'Fear', ru: 'Страх', color: '#3db5ff', file: 'audio/test.mp3' },
      { name: 'Surprise', ru: 'Удивление', color: '#a26bff', file: 'audio/test.mp3' },
      { name: 'Sadness', ru: 'Грусть', color: '#4c6fff', file: 'audio/test.mp3' },
      { name: 'Disgust', ru: 'Отвращение', color: '#2e8b57', file: 'audio/test.mp3' },
      { name: 'Anger', ru: 'Гнев', color: '#ff5c5c', file: 'audio/test.mp3' },
      { name: 'Anticipation', ru: 'Ожидание', color: '#ff8c42', file: 'audio/test.mp3' }
    ];

    const svgGroup = document.getElementById('slices');
    const audio = document.getElementById('audioPlayer');
    const nowPlaying = document.getElementById('nowPlaying');

    const cx = 300, cy = 300;
    const innerR = 100;
    const outerR = 270;

    function polarToCartesian(cx, cy, r, angleDeg) {
      const angleRad = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(angleRad),
        y: cy + r * Math.sin(angleRad)
      };
    }

    function createSlicePath(startAngle, endAngle) {
      const p1 = polarToCartesian(cx, cy, outerR, startAngle);
      const p2 = polarToCartesian(cx, cy, outerR, endAngle);
      const p3 = polarToCartesian(cx, cy, innerR, endAngle);
      const p4 = polarToCartesian(cx, cy, innerR, startAngle);
      const largeArc = endAngle - startAngle <= 180 ? 0 : 1;

      return [
        `M ${p1.x} ${p1.y}`,
        `A ${outerR} ${outerR} 0 ${largeArc} 1 ${p2.x} ${p2.y}`,
        `L ${p3.x} ${p3.y}`,
        `A ${innerR} ${innerR} 0 ${largeArc} 0 ${p4.x} ${p4.y}`,
        'Z'
      ].join(' ');
    }

    function playTrack(emotion, sliceEl) {
      document.querySelectorAll('.slice').forEach(el => el.classList.remove('active'));
      sliceEl.classList.add('active');

      audio.src = emotion.file;
      audio.play().catch(err => {
        console.warn('Автовоспроизведение заблокировано браузером:', err);
      });
      nowPlaying.textContent = `Сейчас играет: ${emotion.ru}`;
    }

    emotions.forEach((emotion, index) => {
      const angleSize = 360 / emotions.length;
      const start = index * angleSize;
      const end = start + angleSize;
      const mid = start + angleSize / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', createSlicePath(start, end));
      path.setAttribute('fill', emotion.color);
      path.setAttribute('class', 'slice');
      path.addEventListener('click', () => playTrack(emotion, path));
      svgGroup.appendChild(path);

      const labelPos = polarToCartesian(cx, cy, 185, mid);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', labelPos.x);
      text.setAttribute('y', labelPos.y);
      text.setAttribute('class', 'label');
      text.textContent = emotion.ru;
      svgGroup.appendChild(text);
    });
  </script>
</body>
</html>
